<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Property Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8f9fa; 
        }
        .text-navy { color: #1d2636; }
        .text-orange { color: #ff9800; }
        
        /* Card styling for consistency */
        .auth-card { 
            max-width: 400px; 
            border-top: 5px solid #ff9800 !important; 
        }

        /* Focus state for orange theme */
        .form-control:focus {
            border-color: #ff9800;
            box-shadow: 0 0 0 0.25rem rgba(255, 152, 0, 0.1);
        }

        /* Premium Button Effect */
        .btn-orange {
            background-color: #ff9800;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-orange:hover {
            background-color: #e68a00;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.3);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100 px-3">

    <div class="auth-card card border-0 shadow-lg p-4 p-sm-5 rounded-4 w-100">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-navy mb-0">Login <span class="text-orange">Account</span></h3>
            <p class="text-muted small">Welcome back! Please enter your details.</p>
        </div>

        <form action="dashboard.php" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">Email Address</label>
                <input type="email" class="form-control form-control-lg fs-6 rounded-3" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">Password</label>
                <input type="password" class="form-control form-control-lg fs-6 rounded-3" placeholder="••••••••" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rem">
                    <label class="form-check-label small text-muted" for="rem">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none fw-semibold text-orange">Forgot?</a>
            </div>

            <button type="submit" class="btn btn-orange w-100 py-3 fw-bold rounded-3 border-0 shadow-sm">Sign In</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">New here? 
                <a href="signup.html" class="text-navy fw-bold text-decoration-none">Create Account</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
