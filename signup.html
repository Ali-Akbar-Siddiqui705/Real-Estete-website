<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Property Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #1d2636;
            --orange: #ff9800;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card { 
            width: 100%;
            max-width: 420px; /* Professional standard width for login/signup */
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            border-top: 6px solid var(--orange);
        }

        .card-body {
            padding: 40px 35px;
        }

        h4 { 
            color: var(--navy); 
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Compact & Modern Inputs */
        .form-group {
            margin-bottom: 15px; /* Tight vertical spacing */
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: #6c757d;
            margin-bottom: 4px;
            margin-left: 2px;
        }

        .form-control {
            padding: 12px 16px;
            font-size: 0.9rem;
            border-radius: 12px;
            border: 1.5px solid #ebebeb;
            background-color: #fbfbfb;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--orange);
            box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.1);
            outline: none;
        }

        .btn-orange {
            background-color: var(--orange);
            color: white;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-orange:hover {
            background-color: #e68a00;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.25);
        }

        .login-link {
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .login-link:hover {
            color: var(--orange);
        }

        /* Animation for smooth feel */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="auth-card fade-in">
    <div class="card-body">
        <div class="text-center mb-4">
            <h4>Create <span class="text-orange">Account</span></h4>
            <p class="text-muted small">Fill the form to get started</p>
        </div>
        
        <form action="register_process.php" method="POST">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>

            <div class="form-group mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Repeat password" required>
            </div>

            <button type="submit" class="btn-orange">Register Now</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">Already a member? 
                <a href="login.html" class="login-link ms-1">Login Instead</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
